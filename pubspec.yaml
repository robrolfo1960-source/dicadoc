name: dicadoc
description: "DicaDoc / PMMC - Suite per aderenza terapeutica e monitoraggio remoto."
publish_to: "none"
version: 0.3.0+3

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Stato (Riverpod)
  flutter_riverpod: ^3.3.1

  # Database locale cifrato (SQLCipher — Fase 3 GDPR).
  drift: ^2.16.0
  sqlcipher_flutter_libs: ^0.7.0
  path_provider: ^2.1.3
  path: ^1.9.0

  # F1 ALERT - notifiche locali con scheduling/escalation
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  flutter_timezone: ^5.1.0

  # F3 GDPR - passphrase cifrata nel keystore del device
  flutter_secure_storage: ^9.2.4

  # F4 ONBOARDING QR - scanner QR per collegamento paziente/MMG
  mobile_scanner: ^5.2.3

  # F5 OCR referti - ML Kit text recognition on-device (script latino)
  google_mlkit_text_recognition: ^0.13.1
  image_picker: ^1.1.2

  # F6 HEALTH CONNECT - patch locale: compileSdk 34→36 per connect-client 1.1.0-alpha11
  health: ^12.2.0

  # F2 SYNC - HTTP client per PocketBase
  http: ^1.2.0

  # Generazione QR per onboarding paziente (medico → paziente)
  qr_flutter: ^4.1.0

  # Utility
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Generazione codice per drift
  drift_dev: ^2.16.0
  build_runner: ^2.4.9

dependency_overrides:
  # Patch locale di health 12.2.1: compileSdk 34 → 36 per compatibilità
  # con androidx.health.connect:connect-client:1.1.0-alpha11 (minCompileSdk=35).
  health:
    path: packages/health

flutter:
  uses-material-design: true
