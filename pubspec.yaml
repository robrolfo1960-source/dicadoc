name: dicadoc
description: "DicaDoc / PMMC - Suite per aderenza terapeutica e monitoraggio remoto (Fase 1: F1 ALERT + P1 TERAPIA)."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Stato (Riverpod)
  flutter_riverpod: ^3.3.1

  # Database locale (SQLite type-safe). NB: per la cifratura GDPR si sostituirà
  # sqlite3_flutter_libs con sqlcipher_flutter_libs in Fase 3 (vedi README).
  drift: ^2.16.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.3
  path: ^1.9.0

  # F1 ALERT - notifiche locali con scheduling/escalation
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  flutter_timezone: ^5.1.0

  # Utility
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Generazione codice per drift
  drift_dev: ^2.16.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
